name: Build Dev (Auto)

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.gitignore'
  workflow_dispatch:
    inputs:
      build_targets:
        description: 'Which artifacts to build (default on push / workflow_dispatch omission: all)'
        required: false
        type: choice
        options:
          - all
          - vscode
          - desktop
          - desktop-mac
          - desktop-win
          - desktop-mac-x64
          - desktop-mac-arm64
          - desktop-win-x64
          - desktop-win-arm64
          - tauri
          - tauri-mac
          - tauri-win
          - tauri-mac-x64
          - tauri-mac-arm64
          - tauri-win-x64
        default: all

permissions:
  contents: write

concurrency:
  group: build-dev-auto-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      suffix: ${{ steps.meta.outputs.suffix }}
      tag_name: ${{ steps.meta.outputs.tag_name }}
      release_name: ${{ steps.meta.outputs.release_name }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Resolve version, suffix & release metadata
        id: meta
        run: |
          VERSION=$(node -p "require('./packages/vscode/package.json').version")
          DATE=$(date +%Y%m%d)
          SHORT_SHA=$(echo "${GITHUB_SHA}" | cut -c1-7)
          echo "suffix=-auto-${DATE}-${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "tag_name=dev-${VERSION}-${{ github.run_number }}" >> "$GITHUB_OUTPUT"
          echo "release_name=Dev Build ${VERSION} (#${{ github.run_number }})" >> "$GITHUB_OUTPUT"

  build:
    needs: prepare
    uses: ./.github/workflows/_build.yml
    with:
      build_targets: ${{ inputs.build_targets || 'all' }}
      suffix: ${{ needs.prepare.outputs.suffix }}
      create_release: true
      prerelease: true
      tag_name: ${{ needs.prepare.outputs.tag_name }}
      release_name: ${{ needs.prepare.outputs.release_name }}
    secrets: inherit
