name: Build Dev (Manual)

on:
  workflow_dispatch:
    inputs:
      build_targets:
        description: 'Which artifacts to build (VSIX vs desktop matrix rows)'
        required: false
        type: choice
        options:
          - all
          - vscode
          - desktop
          - desktop-mac
          - desktop-win
          - desktop-mac-x64
          - desktop-mac-arm64
          - desktop-win-x64
          - desktop-win-arm64
          - tauri
          - tauri-mac
          - tauri-win
          - tauri-mac-x64
          - tauri-mac-arm64
          - tauri-win-x64
        default: all
      suffix:
        description: 'Optional suffix for artifact name (e.g., test, debug)'
        required: false
        type: string
      skip_tests:
        description: 'Skip tests (use with caution)'
        required: false
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: build-dev-manual-${{ github.event.inputs.build_targets }}
  cancel-in-progress: true

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      suffix: ${{ steps.meta.outputs.suffix }}
    steps:
      - name: Resolve suffix
        id: meta
        run: |
          INPUT_SUFFIX="${{ inputs.suffix }}"
          if [ -n "$INPUT_SUFFIX" ]; then
            echo "suffix=-manual-${INPUT_SUFFIX}" >> "$GITHUB_OUTPUT"
          else
            echo "suffix=-manual-${{ github.run_number }}" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: prepare
    uses: ./.github/workflows/_build.yml
    with:
      build_targets: ${{ inputs.build_targets || 'all' }}
      suffix: ${{ needs.prepare.outputs.suffix }}
      skip_tests: ${{ inputs.skip_tests }}
    secrets: inherit
