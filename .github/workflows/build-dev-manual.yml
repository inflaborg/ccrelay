name: Build Dev (Manual)

on:
  workflow_dispatch:
    inputs:
      suffix:
        description: 'Optional suffix for artifact name (e.g., test, debug)'
        required: false
        type: string
      skip_tests:
        description: 'Skip tests (use with caution)'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.skip_tests != 'true' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run lint
        run: npm run lint

      - name: Run tests (unit + integration)
        run: npm run test:all

  build-vscode:
    runs-on: ubuntu-latest
    needs: test
    if: always() && (needs.test.result == 'success' || needs.test.result == 'skipped')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm install
          cd web && npm install

      - name: Build dev package
        run: npm run package:dev

      - name: Get package version and build info
        id: info
        run: |
          VERSION=$(node -p "require('./packages/vscode/package.json').version")
          SHORT_SHA=$(git rev-parse --short HEAD)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "short_sha=$SHORT_SHA" >> $GITHUB_OUTPUT

      - name: Set build suffix
        id: suffix
        run: |
          INPUT_SUFFIX="${{ github.event.inputs.suffix }}"
          if [ -n "$INPUT_SUFFIX" ]; then
            SUFFIX="-manual-${INPUT_SUFFIX}"
          else
            SUFFIX="-manual-${{ github.run_number }}"
          fi
          echo "suffix=$SUFFIX" >> $GITHUB_OUTPUT

      - name: Rename vsix file
        run: |
          SUFFIX="${{ steps.suffix.outputs.suffix }}"
          cd dists
          for file in *.vsix; do
            BASENAME="${file%.vsix}"
            mv "$file" "${BASENAME}${SUFFIX}.vsix"
          done
          ls -la

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ccrelay-vscode-dev-${{ steps.info.outputs.version }}${{ steps.suffix.outputs.suffix }}
          path: dists/*.vsix
          retention-days: 30

    outputs:
      version: ${{ steps.info.outputs.version }}
      short_sha: ${{ steps.info.outputs.short_sha }}
      suffix: ${{ steps.suffix.outputs.suffix }}

  build-desktop:
    needs: [test, build-vscode]
    if: always() && (needs.test.result == 'success' || needs.test.result == 'skipped') && needs.build-vscode.result == 'success'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
            arch: x64
          - os: macos-latest
            platform: mac
            arch: arm64
          - os: windows-latest
            platform: win
            arch: x64
          - os: windows-latest
            platform: win
            arch: arm64
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm install
          cd web && npm install

      - name: Build desktop
        run: npm run desktop:build

      - name: Pack desktop (${{ matrix.platform }} ${{ matrix.arch }})
        run: npx electron-builder --${{ matrix.platform }} --${{ matrix.arch }}
        working-directory: packages/desktop

      - name: Upload desktop artifact
        uses: actions/upload-artifact@v4
        with:
          name: ccrelay-desktop-${{ matrix.platform }}-${{ matrix.arch }}-${{ needs.build-vscode.outputs.version }}${{ needs.build-vscode.outputs.suffix }}
          path: |
            packages/desktop/dist/*.zip
            packages/desktop/dist/*.exe
          retention-days: 30
