name: Build Prod

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag name to release (e.g., v1.0.0), will use package.json version if empty'
        required: false
        type: string

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run lint
        run: npm run lint

      - name: Run tests (unit + integration)
        run: npm run test:all

  build-vscode:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm install
          cd web && npm install

      - name: Build prod package
        run: npm run package:prod

      - name: Get package version
        id: version
        run: |
          VERSION=$(node -p "require('./packages/vscode/package.json').version")
          if [ -n "${{ github.event.inputs.tag_name }}" ]; then
            TAG_NAME="${{ github.event.inputs.tag_name }}"
          else
            TAG_NAME="v${VERSION}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ccrelay-vscode-prod-${{ steps.version.outputs.version }}
          path: dists/*.vsix
          retention-days: 90

    outputs:
      version: ${{ steps.version.outputs.version }}
      tag_name: ${{ steps.version.outputs.tag_name }}

  build-desktop:
    needs: [test, build-vscode]
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
            arch: x64
          - os: macos-latest
            platform: mac
            arch: arm64
          - os: windows-latest
            platform: win
            arch: x64
          - os: windows-latest
            platform: win
            arch: arm64
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm install
          cd web && npm install

      - name: Build desktop
        run: npm run desktop:build

      - name: Pack desktop (${{ matrix.platform }} ${{ matrix.arch }})
        run: npx electron-builder --${{ matrix.platform }} --${{ matrix.arch }}
        working-directory: packages/desktop

      - name: Upload desktop artifact
        uses: actions/upload-artifact@v4
        with:
          name: ccrelay-desktop-${{ matrix.platform }}-${{ matrix.arch }}-${{ needs.build-vscode.outputs.version }}
          path: |
            packages/desktop/dist/*.dmg
            packages/desktop/dist/*.zip
            packages/desktop/dist/*.exe
          retention-days: 90

  release:
    runs-on: ubuntu-latest
    needs: [build-vscode, build-desktop]
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: List release assets
        run: find release-assets -type f | head -50

      - name: Create release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ needs.build-vscode.outputs.tag_name }}
          name: Release ${{ needs.build-vscode.outputs.tag_name }}
          prerelease: false
          files: release-assets/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
