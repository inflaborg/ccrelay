name: Build Prod

on:
  workflow_dispatch:
    inputs:
      build_targets:
        description: 'Which artifacts to build (default: all)'
        required: false
        type: choice
        options:
          - all
          - vscode
          - desktop
          - desktop-mac
          - desktop-win
          - desktop-mac-x64
          - desktop-mac-arm64
          - desktop-win-x64
          - desktop-win-arm64
          - tauri
          - tauri-mac
          - tauri-win
          - tauri-mac-arm64
          - tauri-win-x64
        default: all
      tag_name:
        description: 'Tag name to release (e.g., v1.0.0), will use package.json version if empty'
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: build-prod
  cancel-in-progress: false

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      tag_name: ${{ steps.meta.outputs.tag_name }}
      release_name: ${{ steps.meta.outputs.release_name }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Resolve version & release tag
        id: meta
        run: |
          VERSION=$(node -p "require('./packages/vscode/package.json').version")
          INPUT_TAG="${{ inputs.tag_name }}"
          if [ -n "$INPUT_TAG" ]; then
            TAG_NAME="$INPUT_TAG"
          else
            TAG_NAME="v${VERSION}"
          fi
          echo "tag_name=$TAG_NAME" >> "$GITHUB_OUTPUT"
          echo "release_name=Release $TAG_NAME" >> "$GITHUB_OUTPUT"

  build:
    needs: prepare
    uses: ./.github/workflows/_build.yml
    with:
      build_targets: ${{ inputs.build_targets || 'all' }}
      is_prod: true
      create_release: true
      prerelease: false
      tag_name: ${{ needs.prepare.outputs.tag_name }}
      release_name: ${{ needs.prepare.outputs.release_name }}
      retention_days: 90
    secrets: inherit
