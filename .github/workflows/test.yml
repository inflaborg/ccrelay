name: Test

on:
  pull_request:
    branches:
      - main

concurrency:
  group: test-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check if docs-only changes
        id: check
        run: |
          files=$(gh api repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/files --jq '.[].filename')
          if echo "$files" | grep -qvE '(\.md$|^docs/)'; then
            echo "has_code_changes=true" >> $GITHUB_OUTPUT
          else
            echo "has_code_changes=false" >> $GITHUB_OUTPUT
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Setup Node.js
        if: steps.check.outputs.has_code_changes == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            web/package-lock.json

      - name: Install dependencies
        if: steps.check.outputs.has_code_changes == 'true'
        run: npm install

      - name: Run tests
        if: steps.check.outputs.has_code_changes == 'true'
        run: npm run test

      - name: Skip tests (docs-only)
        if: steps.check.outputs.has_code_changes != 'true'
        run: echo "Skipping tests - documentation only changes"
